<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占い礼～aya～ 東京サロン予約表</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #fafafa;
  margin: 0;
}

h2 {
  font-size: 18px;
  text-align: center;
  margin-bottom: 14px;
}

#dateTabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.date-tab {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
  background: #eee;
  border-radius: 8px;
  font-weight: bold;
}

.date-tab.active {
  background: #4CAF50;
  color: white;
}

.slot {
  margin-bottom: 10px;
  padding: 12px;
  background: white;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.slot.reserved {
  background: #ffecec;
}

.slot.unavailable {
  background: #e0e0e0;
  color: #777;
}

.time-label {
  font-weight: bold;
  margin-bottom: 6px;
}

.slot input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 6px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box;
}

.slot input:disabled {
  background: #f5f5f5;
  font-weight: bold;
}

.slot button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
}

.confirm-btn {
  background: #4CAF50;
}

.cancel-btn {
  background: #e53935;
}

.unavailable-btn {
  background: #999;
}
</style>
</head>

<body>

<h2>占い礼～aya～ 東京サロン予約表</h2>

<div id="dateTabs"></div>
<div id="slots"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

<script>
const client = supabase.createClient(
  "https://swuanggtnglwlpfdojfn.supabase.co",
  "sb_publishable_srG-Ha_kLmuHLFXZ_C4g-g_IhQXRM4H"
);

const dates = ["2024-06-13","2024-06-14","2024-06-15"];

const slotTimes = [
  "9:30-10:00","10:05-10:35","10:40-11:10","11:15-11:45","11:50-12:20",
  "12:25-12:55","13:00-13:30","13:35-14:05","14:10-14:40","14:45-15:15",
  "15:20-15:50","15:55-16:25","16:30-17:00","17:05-17:35","17:40-18:05",
  "18:10-18:40","18:45-19:15","19:20-19:50","19:55-20:25"
];

let currentDate = dates[0];

function renderDateTabs() {
  const tabs = document.getElementById("dateTabs");
  tabs.innerHTML = "";

  dates.forEach(date => {
    const tab = document.createElement("div");
    tab.className = "date-tab" + (date === currentDate ? " active" : "");
    tab.textContent = date.replace("2024-","").replace("-","/");
    tab.onclick = () => {
      currentDate = date;
      renderDateTabs();
      loadSlots();
    };
    tabs.appendChild(tab);
  });
}

async function loadSlots() {
  const { data } = await client
    .from("reservations")
    .select("*")
    .eq("date", currentDate);

  const reservations = data || [];
  const slots = document.getElementById("slots");
  slots.innerHTML = "";

  slotTimes.forEach((time,index) => {
    const slotNumber = index + 1;
    const found = reservations.find(r => r.slot === slotNumber);

    const row = document.createElement("div");
    row.className = "slot";

    const timeLabel = document.createElement("div");
    timeLabel.className = "time-label";
    timeLabel.textContent = time;

    const input = document.createElement("input");
    input.placeholder = "お名前を入力";

    const btn = document.createElement("button");

    const isUnavailable =
      currentDate === "2024-06-15" && index >= 9;

    if (isUnavailable) {
      row.classList.add("unavailable");
      input.disabled = true;
      input.placeholder = "予約不可";

      btn.textContent = "予約不可";
      btn.className = "unavailable-btn";
      btn.disabled = true;

    } else if (found) {
      row.classList.add("reserved");

      input.value = found.name;
      input.disabled = true;

      btn.textContent = "解除";
      btn.className = "cancel-btn";
      btn.onclick = () => cancelSlot(slotNumber);

    } else {
      btn.textContent = "確定";
      btn.className = "confirm-btn";
      btn.onclick = () => reserveSlot(slotNumber, input.value);
    }

    row.appendChild(timeLabel);
    row.appendChild(input);
    row.appendChild(btn);
    slots.appendChild(row);
  });
}

async function reserveSlot(slot, name) {
  const cleanName = name.trim();
  if (!cleanName) return alert("名前を入力してください");

  await client.from("reservations").insert({
    date: currentDate,
    slot,
    name: cleanName
  });

  loadSlots();
}

async function cancelSlot(slot) {
  await client.from("reservations")
    .delete()
    .eq("date", currentDate)
    .eq("slot", slot);

  loadSlots();
}

renderDateTabs();
loadSlots();
</script>

</body>
</html>
