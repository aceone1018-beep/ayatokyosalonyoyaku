<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>占い礼～aya～ 東京サロン予約表</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .date-tab { display: inline-block; padding: 8px 14px; margin-right: 8px; background: #eee; cursor: pointer; border-radius: 6px; }
    .date-tab.active { background: #4CAF50; color: white; }
    .slot { display: flex; align-items: center; margin: 8px 0; }
    .slot input { flex: 1; padding: 6px; }
    .slot button { margin-left: 8px; padding: 6px 12px; }
    .reserved { background: #ffdddd; }
  </style>
</head>
<body>

<h2>占い礼～aya～ 東京サロン予約表</h2>

<div id="dateTabs"></div>
<div id="slots"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

<script>
  const client = supabase.createClient(
    "https://swuanggtnglwlpfdojfn.supabase.co",
    "ここにあなたの anon key（sb_publishable_〜）をそのまま貼る"
  );

  const dates = ["2024-06-13", "2024-06-14", "2024-06-15"];

  const slotTimes = [
    "9:30-10:00","10:05-10:35","10:40-11:10","11:15-11:45","11:50-12:20",
    "12:25-12:55","13:00-13:30","13:35-14:05","14:10-14:40","14:45-15:15",
    "15:20-15:50","15:55-16:25","16:30-17:00"
  ];

  let currentDate = dates[0];

  function renderDateTabs() {
    const tabs = document.getElementById("dateTabs");
    tabs.innerHTML = "";
    dates.forEach(date => {
      const tab = document.createElement("div");
      tab.className = "date-tab" + (date === currentDate ? " active" : "");
      tab.textContent = date.replace("2024-", "").replace("-", "/");
      tab.onclick = () => { currentDate = date; renderDateTabs(); loadSlots(); };
      tabs.appendChild(tab);
    });
  }

  async function loadSlots() {
    const { data } = await client.from("reservations").select("*").eq("date", currentDate);

    const slots = document.getElementById("slots");
    slots.innerHTML = "";

    slotTimes.forEach((time, index) => {
      const row = document.createElement("div");
      row.className = "slot";

      const input = document.createElement("input");
      input.placeholder = time;

      const btn = document.createElement("button");

      const found = data?.find(r => r.slot === index + 1);

      if (found) {
        row.classList.add("reserved");
        input.value = found.name;
        btn.textContent = "解除";
        btn.onclick = () => cancelSlot(index + 1);
      } else {
        btn.textContent = "確定";
        btn.onclick = () => reserveSlot(index + 1, input.value);
      }

      row.appendChild(input);
      row.appendChild(btn);
      slots.appendChild(row);
    });
  }

  async function reserveSlot(slot, name) {
    if (!name) return alert("名前を入力してください");
    await client.from("reservations").insert({ date: currentDate, slot, name });
    loadSlots();
  }

  async function cancelSlot(slot) {
    await client.from("reservations").delete().eq("date", currentDate).eq("slot", slot);
    loadSlots();
  }

  renderDateTabs();
  loadSlots();
</script>

</body>
</html>
