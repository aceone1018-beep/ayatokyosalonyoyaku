<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>占い礼～aya~ 東京サロン予約表</title>

  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Shippori Mincho", serif;
      padding: 10px;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 20px;
      font-size: 26px;
      font-weight: 600;
    }

    .date-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .date-tab {
      padding: 8px 14px;
      background: #ddd;
      border-radius: 6px;
      cursor: pointer;
    }

    .date-tab.active {
      background: #4caf50;
      color: white;
    }

    .slot {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s;
    }

    .reserved {
      background: #ffe4e9 !important;
    }

    .slot.gray {
      background: #ccc;
      color: #666;
    }

    input {
      width: 120px;
      padding: 6px;
    }

    button {
      padding: 6px 10px;
      color: white;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <h2>占い礼～aya~ 東京サロン予約表</h2>

  <div class="date-tabs">
    <div class="date-tab active" data-date="2024-06-13">6/13</div>
    <div class="date-tab" data-date="2024-06-14">6/14</div>
    <div class="date-tab" data-date="2024-06-15">6/15</div>
  </div>

  <div id="slots"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

  <script>
    const client = supabase.createClient(
      "https://swuanggtnglwlpfdjofjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3dWFuZ2d0bmdsd2xwZmRvamZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTQ0NzQsImV4cCI6MjA5Mjg3MDQ3NH0.lSgwuT9CrrNnp4gNC_N1Q_tjNP1EXKphnI9aEf3hWR8"
    );

    const slotTimes = [
      "9:30-10:00","10:05-10:35","10:40-11:10","11:15-11:45","11:50-12:20",
      "12:25-12:55","13:00-13:30","13:35-14:05","14:10-14:40","14:45-15:15",
      "15:20-15:50","15:55-16:25","16:30-17:00","17:05-17:35","17:40-18:05",
      "18:10-18:40","18:45-19:15","19:20-19:50","19:55-20:25"
    ];

    let currentDate = "2024-06-13";

    document.querySelectorAll(".date-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".date-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentDate = tab.dataset.date;
        loadSlots();
      });
    });

    async function loadSlots() {
      const slotsDiv = document.getElementById("slots");
      slotsDiv.innerHTML = "";

      const { data } = await client
        .from("reservations")
        .select("*")
        .eq("date", currentDate);

      const rows = data || [];

      for (let i = 1; i <= 19; i++) {
        const record = rows.find(r => Number(r.slot) === i);
        const name = record ? record.name : "";
        const isReserved = name && name.trim() !== "";

        const slotDiv = document.createElement("div");
        slotDiv.className = "slot";

        if (isReserved) slotDiv.classList.add("reserved");

        const isGray = currentDate === "2024-06-15" && i >= 11;
        if (isGray) slotDiv.classList.add("gray");

        slotDiv.innerHTML = `
          <div>${i}. ${slotTimes[i - 1]}</div>
          <input id="name-${i}" value="${name}" ${isReserved || isGray ? "disabled" : ""}>
          <button id="btn-${i}"
            style="background:${isReserved ? "#d9534f" : "#4caf50"}"
            onclick="${isReserved ? `cancelSlot(${i})` : `saveSlot(${i})`}"
            ${isGray ? "disabled" : ""}
          >
            ${isReserved ? "解除" : "確定"}
          </button>
        `;

        slotsDiv.appendChild(slotDiv);
      }
    }

    async function saveSlot(slot) {
      const name = document.getElementById(`name-${slot}`).value;

      await client
        .from("reservations")
        .upsert({
          date: currentDate,
          slot: slot,
          name: name
        });

      loadSlots();
    }

    async function cancelSlot(slot) {
      await client
        .from("reservations")
        .upsert({
          date: currentDate,
          slot: slot,
          name: ""
        });

      loadSlots();
    }

    loadSlots();
  </script>
</body>
</html>
