<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約表</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
      background: #f5f5f5;
    }
    h2 {
      margin-top: 20px;
    }
    .date-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .date-tab {
      padding: 8px 14px;
      background: #ddd;
      border-radius: 6px;
      cursor: pointer;
    }
    .date-tab.active {
      background: #4caf50;
      color: white;
    }
    .slot {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .slot.gray {
      background: #ccc;
      color: #666;
    }
    input {
      width: 120px;
      padding: 6px;
    }
    button {
      padding: 6px 10px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h2>予約表</h2>

  <div class="date-tabs">
    <div class="date-tab active" data-date="2024-06-13">6/13</div>
    <div class="date-tab" data-date="2024-06-14">6/14</div>
    <div class="date-tab" data-date="2024-06-15">6/15</div>
  </div>

  <div id="slots"></div>

  <!-- Supabase v2 UMD 版 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

  <script>
    // Supabase 初期化
    const client = supabase.createClient(
      "https://swuanggtnglwlpfdjofjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3dWFuZ2d0bmdsd2xwZmRvamZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTQ0NzQsImV4cCI6MjA5Mjg3MDQ3NH0.lSgwuT9CrrNnp4gNC_N1Q_tjNP1EXKphnI9aEf3hWR8"
    );

    // 時間枠（slot 1〜19）
    const slotTimes = [
      "10:00-10:30","10:30-11:00","11:00-11:30","11:30-12:00",
      "12:00-12:30","12:30-13:00","13:00-13:30","13:30-14:00",
      "14:00-14:30","14:30-15:00","15:00-15:30","15:30-16:00",
      "16:00-16:30","16:30-17:00","17:00-17:30","17:30-18:00",
      "18:00-18:30","18:30-19:00","19:00-19:30"
    ];

    // 現在選択中の日付
    let currentDate = "2024-06-13";

    // 日付タブ切り替え
    document.querySelectorAll(".date-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".date-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentDate = tab.dataset.date;
        loadSlots();
      });
    });

    // スロット読み込み
    async function loadSlots() {
      const slotsDiv = document.getElementById("slots");
      slotsDiv.innerHTML = "";

      const { data, error } = await client
        .from("reservations")
        .select("*")
        .eq("date", currentDate);

      const rows = data || [];

      for (let i = 1; i <= 19; i++) {
        const record = rows.find(r => r.slot === i);
        const name = record ? record.name : "";

        const slotDiv = document.createElement("div");
        slotDiv.className = "slot";

        if (currentDate === "2024-06-15" && i >= 11) {
          slotDiv.classList.add("gray");
        }

        slotDiv.innerHTML = `
          <div>${i}. ${slotTimes[i - 1]}</div>
          <input id="name-${i}" value="${name}" ${slotDiv.classList.contains("gray") ? "disabled" : ""}>
          <button onclick="saveSlot(${i})" ${slotDiv.classList.contains("gray") ? "disabled" : ""}>保存</button>
        `;

        slotsDiv.appendChild(slotDiv);
      }
    }

    // 保存処理
    async function saveSlot(slot) {
      const name = document.getElementById(`name-${slot}`).value;

      await client
        .from("reservations")
        .upsert({
          date: currentDate,
          slot: slot,
          name: name
        });

      alert("保存しました");
      loadSlots();
    }

    // 初回読み込み
    loadSlots();
  </script>
</body>
</html>
